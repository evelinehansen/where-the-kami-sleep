    text: `The moment Senna stepped through the automatic doors at Haneda International Airport, she stopped.

Not because of the noise, or the crowds, or the impossibly efficient streams of people flowing in every direction without touching. She stopped because of the silence underneath all of it.

"You're going to cause a bottleneck," Daien said from behind her, camera already raised.

She let him pass. She needed a moment.

There was something about the way the space had been arranged. The wide ceiling arching overhead like a held breath. The deliberate pauses between signs. The gaps between people that were somehow not gaps at all, but something more considered — as if the emptiness itself had been designed. In most airports she had visited, every centimetre felt claimed. Here, the empty space felt intentional. Necessary. As though someone had designed the air itself with the same care as the walls.

Torei came through last, ducking slightly at the door out of old habit. "Can you see Fuji from here?" he asked no one in particular.

"We're in an airport," Shizune said. She was already moving toward the train signs, coffee from the plane still in her hand. "Come on."

But Senna had opened her sketchbook.

She drew nothing specific. Only the shape of the space between the columns. The pause between one person and the next. In Japan, she had read, there was a word for this: *ma*. Not simply emptiness — but a charged and meaningful gap. A silence that carries as much weight as the things surrounding it. A rest in the music that makes the notes matter.

Her pencil moved slowly. Without thinking, she curved the edge of the space into something almost like an arch. Then, inside the arch, her hand traced a slow spiral. She stopped. Looked at it.

She didn't know why she had drawn that. She put the pencil down.

She didn't know yet that she would draw this same shape again — in twenty-three different places, across four cities, in rain and temple smoke and the pale light before dawn. And that each time, it would look slightly different, and utterly familiar. Like hearing the same word spoken in a dozen different voices.

"Senna." Daien was beside her now, looking at the sketchbook. "What is that?"

She closed it before she could think too much about it.

"I don't know yet," she said.

Outside the wide windows, the evening had settled into a deep persimmon orange. Somewhere in the city ahead of them, something was already beginning. They didn't know it yet — but it had known them for a long time.`,

    text: `Nobody had planned to end up in an izakaya on their first night. It was Shizune who found it — or rather, who nearly ran past it on her way back from a seven-kilometre loop through Shinagawa, and stopped when she smelled the grilling chicken.

The entrance was a curtain, dark blue, worn soft at the edges. Daien photographed it before they went in.

Inside, the room was small and warm and slightly smoky. Six tables, a counter with four stools, a television in the corner playing baseball without sound. Two salarymen at the bar ate in companionable silence. A group of four women in office clothes laughed at something on a phone screen, covering their mouths. Nobody looked up when the four foreigners walked in, which felt like a kind of welcome.

In Japan, the izakaya is not a pub and not a restaurant — it is a third place. A room that holds what is not quite home and not quite work: the honest hours in between. People come to eat and drink slowly, to share dishes from the centre of the table, to let the day dissolve without any particular hurry.

Torei ordered four different skewers and pointed at the menu hopefully until the server smiled. Shizune had coffee — the server brought it without expression, as if this were completely normal. Daien photographed the ceramic cups. Senna ate with her sketchbook open on her knee, not drawing, just feeling the weight of it.

They shared without thinking about it. Someone passed the edamame before being asked. Someone else moved the sake cup closer to whoever's hand was nearest. The food was simple and the evening was long and easy, and for a while the strangeness of being somewhere so far from home dissolved into something that felt almost like belonging.

On the train back to the hotel, later, Daien scrolled through the photos he'd taken. The blue curtain. The cups. The low light over the counter.

He stopped at one photo. He hadn't meant to take it — a blur, camera moving at the wrong moment. But in the motion and the grain, the negative space between the lampshade and the wall had resolved into something. A dark arch. A pale spiral inside it.

He stared at it for two stops.

Then he closed his camera and looked out the window at the lit-up city sliding past.`,

    text: `Shizune had been running since five in the morning. By the time the others were dressed, she had already been to Asakusa and back, and was on her second coffee, standing outside the hotel in the pale grey light, hardly even breathing hard.

"There are barely any people yet," she said. "We should go now."

Senso-ji at dawn was a different temple from the one in photographs. The lantern at the Kaminarimon gate was enormous and dark red, perfectly still in the morning air. The incense smoke moved in slow columns. A few older women swept the courtyard with long brooms, methodically, without looking up.

At the main hall, Senna watched people pray. The ritual was precise and quiet: two bows, two claps, hands pressed together, one bow more. Daien was counting the motions under his breath, trying to understand the grammar of it.

The temple sold ema — small wooden plaques on which visitors wrote their wishes, then hung them on racks to be carried upward by the smoke and the attention of the gods. They also sold omamori, cloth charms for different kinds of luck: safe travel, good health, success in study. And omikuji — strips of paper telling your fortune, from great blessing to great curse. If the fortune was bad, you tied the paper to a wire frame and left the misfortune behind.

Senna bought an ema. She meant to write something simple — *safe travels* — but her hand moved before she thought about it. She drew the arch. The spiral. She stared at it for a moment, then wrote her wish underneath it and hung the plaque with the others.

She turned to find an older man in priestly robes standing a few feet away, watching her. Not the plaque. Her.

He said something in Japanese. Torei, who was closest, looked between them helplessly.

The priest pointed at Senna's sketchbook, which was tucked under her arm. Then he spoke again.

A young temple volunteer, hovering nearby, leaned in. "He says — he is asking where you learned that marking."

Senna looked at her hands.

"I didn't," she said. "I just drew it."

The priest listened to the translation. His expression did not change. He bowed once, very formally, and walked away.`,

    text: `Daien had read about Meiji Jingu before they came. He knew about the 100,000 trees planted in 1920, the hundred-year plan for the forest to become self-sustaining, the way volunteers still tend it. He knew it was in the middle of Tokyo, surrounded by Harajuku and Shibuya and all that neon and noise.

What he had not read about — because no article had quite said it — was the feeling of walking in.

One moment: the street. Traffic, voices, a delivery scooter. The next moment: trees. The silence didn't arrive gradually. It landed all at once, like a door closing. Even Shizune slowed down.

In Shinto, the presence of kami — the spirits or forces that inhabit the natural world — is understood to be real and local. Not abstract. Kami live in specific trees, specific stones, specific places where something extraordinary happened or something ancient grew. A forest like Meiji Jingu's, deliberately planted with intention over a century, has accumulated a weight of attention and care that is not separate from the sacred — it is what the sacred is made of.

Torei kept stopping to look up. He was tall enough that the low branches sometimes brushed his shoulder, and each time he looked as though he wasn't sure whether he should apologise.

"It feels like it's breathing," he said, after a while.

Nobody argued with this.

Senna walked slowly at the edge of the path, where the gravel gave way to the roots of a camphor tree that had been alive for longer than anyone present could fully imagine. She opened her sketchbook. She was going to draw the tree.

Instead, she drew the space between the roots. The curve where the wood rose from the ground. The shadow underneath. And there it was again — not in the tree, but emerging from the shape of the shadow at its base. The arch. The spiral.

She closed the book. Looked at the tree. The tree did not seem to notice.

Behind her, a crow landed on a branch and sat there in perfect silence, watching.`,

    text: `Jimbocho looked like no other neighbourhood in Tokyo. The bookshops began where the coffee shops ended, and the coffee shops had books in the windows, and the books spilled onto tables outside where old men turned pages with the patience of people who had nowhere else to be and nowhere they'd rather go.

Daien disappeared into a bookshop almost immediately and had to be left there.

Senna found the gallery by accident. It occupied a single room on the second floor of a narrow building, reached by a staircase so steep it was nearly a ladder. The sign in the window said nothing she could read. She went up anyway.

The gallery showed kintsugi. Ceramic bowls and cups and plates, broken at some point in their history and repaired with lacquer mixed with gold — so that the fracture lines were not hidden but emphasised. Made luminous. The philosophy behind the practice is old and precise: breakage is part of an object's history, and concealing damage is a lesser response than incorporating it. The gold does not pretend the crack was never there. It declares it. It says: *this is where the breaking happened, and the breaking is beautiful.*

Senna moved from piece to piece very slowly. One bowl, near the centre of the room, had been broken in a starburst pattern from a point near its rim. The gold veins radiated outward in all directions, then curved slightly inward near the base.

She stopped.

The pattern of the gold lines — the curve, the way they reached outward and then inward — traced, almost exactly, the shape of the arch. The spiral. Not precisely, not a copy. But a version. A relative.

She was still staring at it when Daien appeared behind her, slightly out of breath, a secondhand book tucked under each arm.

"What is it?" he said.

She pointed. He raised his camera. He photographed the bowl from directly above.

Later, walking back to meet Torei and Shizune, neither of them mentioned it. But Daien had the photo open on his screen, and he kept tilting his head, trying to see it from a different angle.`,

  {
    n: 6,
    title: `The Painter Who Left No Name`,
    topic: `Byōbu — Japanese painted folding screens; and the first clear sighting of the symbol`,
    city: `Tokyo`,
    publishDate: `June 13, 2026`,
    slabel: `Byōbu — Japanese folding screens (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Byōbu`,
    text: `The Tokyo National Museum was Daien's idea. He had seen a photograph of the byōbu screens in an exhibition catalogue and wanted to stand in front of the real thing, because he believed that photographs of paintings were a form of mistranslation — useful and incomplete, like a map of a city you have never walked.

Byōbu are folding screens: large, painted on gold leaf, designed to divide a room and fill it with landscape at the same time. The great screens of the Edo and Momoyama periods show mountains, pine trees, waterbirds, pilgrim roads — all rendered in a style that is neither precisely realistic nor purely symbolic, but something between the two, where the world becomes more itself.

Senna stood in front of a screen from the early Edo period — circa 1680, the label said. Six panels, gold background, a mountain road in autumn. Pilgrims moved along the road in small groups, their backs to the viewer, heading toward a peak that sat just at the edge of the rightmost panel, partially out of frame, as if the mountain refused to be fully contained.

She was looking at the pilgrims' robes when she saw it.

In the bottom left corner of the first panel — small, easy to miss, nearly obscured by the darkened gold at the panel's edge — was a mark. Not a signature. It was too geometric, too deliberate. An arch. A spiral.

Senna made a sound.

"What?" said Daien, who was photographing a different screen.

She pointed. He came. He looked. He photographed it — close, then closer, then as close as the glass would allow.

The label on the screen read: *Pilgrim Road in Autumn. Painter unknown. Believed to depict a mountain route in the Edo period. Donated to the museum in 1923.*

Believed to depict. Not confirmed.

A museum curator happened to be passing. Daien showed her the photograph on his screen and asked, in careful English, about the mark.

The curator looked at it for a long moment. Then she looked at them both, with an expression that was difficult to name.

"There is an object in our storage collection," she said, slowly. "It has been catalogued but never exhibited. The description says it is waiting to be identified by someone who can read it." She paused. "Would you like to make an appointment?"`,

  {
    n: 7,
    title: `The Mountain That Waits`,
    topic: `Fujisan — Mount Fuji as sacred mountain, pilgrimage and World Heritage`,
    city: `Tokyo`,
    publishDate: `June 20, 2026`,
    slabel: `Mount Fuji as World Heritage Site — UNESCO`,
    surl: `https://whc.unesco.org/en/list/1418/`,
    text: `They took the train to Hakone on a clear morning, which is the only kind of morning that works.

Fuji is not always visible. Clouds gather around it for reasons that feel less like meteorology and more like temperament. But when the mountain appears — suddenly, above the treeline or across the water — it arrives with the force of something that has been there all along, quietly insisting on its own reality, waiting for you to stop looking at other things.

Torei saw it first, from the train window. He said nothing. He simply put his hand on the glass.

Mount Fuji has been sacred in Japan for over a thousand years — venerated in Shinto as the home of the goddess Konohanasakuya-hime, climbed as a pilgrimage route with eight stations marking the ascent, each associated with a different stage of spiritual passage. Climbing was, for centuries, a religious act rather than a recreational one. The pilgrim who reached the summit crater was understood to have moved through something — not just altitude, but a threshold between the ordinary and the divine.

The mountain became a UNESCO World Heritage Site in 2013 — not for its natural beauty alone, but for its cultural significance. For what it has meant to the people who painted it, climbed it, prayed toward it, and dreamed of it from every corner of Japan.

Torei stood at the edge of Lake Ashi for a long time. The mountain's reflection lay perfectly inverted in the still water below — two Fujis, one rising and one descending, meeting at the surface in between.

When he finally spoke, his voice was quieter than usual.

"I feel like I've been here before."

Senna looked at him. She had known Torei for eight years and had never heard him say anything like that. He was not someone who said things like that.

"Maybe you dreamed it," Shizune said, from slightly further along the shore, where she had run without them noticing.

Torei shook his head. He kept looking at the water.

Daien took a photograph of the reflection. He didn't show it to anyone, but when he looked at it later, the cloud formations around the summit had arranged themselves into something he wasn't ready to name.`,

  {
    n: 8,
    title: `The Philosophy of Exactly on Time`,
    topic: `Ekiben — station bento culture, and the Japanese understanding of punctuality`,
    city: `Journey`,
    publishDate: `June 27, 2026`,
    slabel: `Ekiben — Japanese station bento culture (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Ekiben`,
    text: `The Shinkansen left at 9:43. Not 9:44. Not at approximately quarter to ten. At 9:43, which is the time it said it would leave, because in Japan this is not a promise but a fact stated in advance.

They made it to the platform with four minutes to spare, which Shizune considered reckless and Torei considered fine.

The train was very quiet, very clean, and moving at speeds that didn't feel like speeds at all — more like a sustained decision to be somewhere else. The landscape outside shifted from city to suburb to mountain and back again before anyone had quite processed the change.

Daien had bought ekiben at the station. Station bento — the artform of the platform — are more than lunch. They are a whole philosophy compressed into a lacquered box: that transience does not excuse carelessness, that a meal eaten in movement still deserves to be beautiful. Each region has its own ekiben tradition, its own ingredients, its own box design. The contents change with the seasons. Some ekibens are sold only at a single station. Miss the stop and you miss the lunch forever.

Shizune opened hers and sat very still for a moment, which was how she expressed extreme approval.

Inside the box: five compartments, each with something different, each something she couldn't fully identify but ate slowly so it would last. Torei ate his in approximately ninety seconds and then looked out the window with the expression of a man who has done something he doesn't regret.

Daien, eating with one hand, opened the secondhand book he'd bought in Jimbocho with the other. It was old, small, printed on paper that had gone yellow at the edges. He'd bought it because of a woodblock print on the cover — a pilgrim road between mountains. He'd assumed it was decorative.

But in the chapter he found himself reading, there was a passage about a mark used by a particular group of Edo-period pilgrims. A four-gate mark, the text called it. Used to sign a route that connected four sacred sites through the ancient roads of Japan.

Daien set down his chopsticks.

He looked at Senna.

She was looking out the window, watching the mountains go past. She had her sketchbook open on her knee, and she wasn't drawing.

He closed the book slowly and didn't say anything yet.`,

  {
    n: 9,
    title: `The Brewer Who Did Not Rush`,
    topic: `Sake brewing — the toji tradition and sake's ritual meaning in Shinto`,
    city: `Takayama`,
    publishDate: `July 04, 2026`,
    slabel: `Sake — Japanese rice wine and Shinto ritual (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Sake`,
    text: `Takayama arrived like a memory of something older.

The old town was a grid of dark wooden buildings and narrow lanes that had not changed, in any essential way, in three hundred years. The air was different from Tokyo's — cooler, slower, carrying the smell of cedar and something fermented and faintly sweet.

The sake brewery was indicated by a sugidama hanging above the door: a ball of cedar branches, bound tightly, dark green in the autumn light. In Japan, when a new batch of sake is ready, the brewer hangs a fresh sugidama. As the cedar dries and the ball darkens, the sake matures. You can read the season of the drink in the colour of the ball.

Inside, the toji — the master brewer — was an old woman named Hanako who had made sake in this building for forty-one years. She had learned from her father, who had learned from his. The tradition of the toji is precise and demanding: the timing of the fermentation, the temperature of the water, the particular mineral composition of the local spring. In Shinto, sake is not merely a drink — it is an offering. The gods receive it at ceremonies and festivals; humans receive what remains. The act of making it is understood as a sacred act.

Hanako poured each of them a small ceramic cup without speaking. The sake was clean and cold and tasted of nothing they had words for.

Then she gestured toward Senna's sketchbook, which was tucked under her arm. She said something in Japanese and mimed drawing.

Senna opened the book and offered it — intending to draw Hanako's portrait if she liked. But when she opened it, the page that showed was the one with the arch, the spiral. She'd been returning to it, unconsciously, for days.

Hanako's expression changed.

She spoke rapidly to her young assistant, who had been standing by the door. The assistant listened, looked at the sketchbook, and back at his employer. He translated carefully.

"She says — you should not go into the mountains."

Senna looked at the sketchbook. Then at Hanako.

The old brewer held her gaze and did not look away.`,

  {
    n: 10,
    title: `The Hands That Built Together`,
    topic: `Gasshō-zukuri farmhouses and the yui system of communal labour`,
    city: `Takayama`,
    publishDate: `July 11, 2026`,
    slabel: `Gasshō-zukuri — thatched farmhouses of Shirakawa-gō (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Gass%C5%8D-zukuri`,
    text: `They went into the mountains anyway.

Not immediately — they spent a morning at the Hida Folk Village, the open-air museum on the edge of Takayama where historic farmhouses from the surrounding valleys had been gathered and preserved. It seemed like a reasonable next step. The kind of thing you do before you do something you've been advised not to.

The farmhouses were enormous. The roofs especially — steep, angled, thatched with grass bundled so thick and precise that the structure seemed less like a roof and more like a natural formation, a hillside growing from the building. The style is called gasshō-zukuri: *hands pressed together in prayer*. The angle of the pitch is said to mirror the angle of two palms held upright, fingertips touching. In deep mountain winters, the slope sheds snow before the weight can collapse the structure. Form and faith aligned into architecture.

Torei had to duck entering every door.

Inside, one of the farmhouses displayed the tools and records of the *yui* system — the tradition of communal labour sharing that made structures like these possible. No single family could build a gasshō-zukuri roof alone. The beams were too long, the thatch too heavy. So the community came. Families took turns: this season we thatch your roof; next season you thatch ours. No money exchanged. The currency was time and presence, and it balanced over years.

Daien photographed the interior beams. They were black with centuries of smoke from the central hearth below — the smoke that preserved the wood, kept out insects, cured whatever was hung above it.

He was photographing a crossbeam near the rear wall when he stopped.

He called to Senna without raising his voice.

She came. She looked.

Carved into the beam — not painted, not inked, but cut into the wood with something sharp and certain — was the symbol. Not once. Three times, side by side, each mark identical. And beside the third, a gap in the beam where the wood had been deliberately smoothed flat. A space left empty. The exact right size for a fourth.

Nobody spoke for a moment.

"It's been waiting," Senna said.`,

  {
    n: 11,
    title: `The Shrine That Walks`,
    topic: `Matsuri — Japanese festival culture and the mikoshi`,
    city: `Takayama`,
    publishDate: `July 18, 2026`,
    slabel: `Mikoshi — the portable shrine (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Mikoshi`,
    text: `The Takayama Autumn Festival arrived without warning — or rather, they arrived into it without warning, turning a corner from the folk village path into a street that was suddenly full of colour and noise and the deep, rhythmic sound of taiko drums.

The Takayama Matsuri is one of Japan's most celebrated festivals, held twice yearly: once in spring, once in autumn. The streets fill with elaborate floats — yatai — that took craftsmen generations to build. Mechanical puppets perform on the float stages. Lanterns hang between the buildings. The whole city remembers itself.

But it was the mikoshi that made Shizune stop running.

A mikoshi is a portable shrine — a small, lacquered structure carried on long wooden poles by teams of bearers, designed to transport the kami of a specific shrine through the streets of the neighbourhood it protects. The bearers chant as they carry it, and the rocking motion — rhythmic, deliberate — is understood to please the deity inside. The kami rides through the world of its people, and the people are reminded that the sacred lives among them, not only in fixed places.

Shizune stood completely still, which was remarkable, and watched the mikoshi go past.

"Did you see their faces?" she said, when the chanting had moved further down the street.

Daien said: "What about them?"

"They weren't carrying it," she said. "They were being carried by it."

Nobody had an answer for this.

Later that evening, reviewing the afternoon's photographs in the low light of the inn, Daien found the frame he'd taken when the mikoshi passed closest. He zoomed in on the lacquered panels on the shrine's side — the decorative gilded work — and enlarged the image until the gold blurred into pixels.

He went back to the original frame and looked again.

The decorative motif on the central panel looked like the symbol. Exactly like it.

He found Senna. She looked at the screen. She went and got her sketchbook and held it beside the screen.

They went back to the street the next morning. The mikoshi was gone. The festival moved on. They could find no one who knew whose mikoshi it had been.`,

  {
    n: 12,
    title: `What the Forest Gives Back`,
    topic: `Shinrin-yoku — forest bathing, the science and practice of healing through trees`,

    publishDate: `July 25, 2026`,
    slabel: `Shinrin-yoku — forest bathing (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Shinrin-yoku`,
    text: `Shizune's idea. Of course it was Shizune's idea.

She woke them at six with the particular quality of knock she reserved for things she considered important: three times, unhurried, certain. The mountain forest began twenty minutes' walk from the inn, and the morning was cold and clear and too good to waste.

Shinrin-yoku — forest bathing — is not a metaphor. The practice was formalised in Japan in the 1980s and has since accumulated decades of research: spending time among trees measurably lowers cortisol, reduces blood pressure, improves immune function and mood. The mechanism is partly phytoncides — antimicrobial compounds that trees release, which humans absorb through the lungs and skin. The forest is not merely a pleasant backdrop. It is medicine. The trees are doing something to you while you walk.

None of the four spoke for the first twenty minutes. This happened naturally, without agreement.

The path moved between cedar and oak and something lower and darker that Senna couldn't name. The light came through in columns. Their footsteps were quiet on the moss. Torei kept stopping to look up at the canopy — not for any reason he could explain, just because the shapes there seemed worth understanding. Daien had not raised his camera once.

Senna realised, somewhere around the third rise in the path, that she hadn't opened her sketchbook either. She was just walking. Just breathing. Feeling the cold and the green and the smell of something alive and slow and indifferent to urgency.

She didn't need to draw anything. The shape was already there, in the forest, if she looked. In the curve of every branch. In the space between trees. She was beginning to think the shape had always been everywhere, and that she had simply learned how to see it.

At the edge of a clearing, where the path crested a low ridge, the trees parted.

A stone path, narrow, covered with moss, led downward into the trees on the other side. It was not on any map they had looked at. There was no sign.

Torei started down it before anyone said anything.`,

  {
    n: 13,
    title: `The Demon at the Threshold`,
    topic: `Tengu — the mountain demons of Japanese mythology`,
    city: `Takayama`,
    publishDate: `August 01, 2026`,
    slabel: `Tengu — the mountain spirits of Japan (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Tengu`,
    text: `The stone path took twenty minutes to descend and opened into a clearing so quiet it felt like the forest had stepped back to make room for something.

At the centre was a small shrine. Very old — the wood weathered silver, the rope above the threshold thick and frayed, heavy stone lanterns flanking the steps. A wooden plaque above the gate bore a single carved image: a figure with enormous wings and a nose so long it curved downward. A beak, almost. The face of a tengu.

In Japanese mythology, tengu are the spirits of the high mountains. They are not simply demons — the word doesn't quite fit. They are guardians, tricksters, teachers. In older tradition they were feared; travelers who disrespected the mountain paths would find themselves turned around, unable to leave the forest, walking in circles until they understood. In later tradition they were venerated as beings of tremendous martial and spiritual power — the legendary swordsmen of the mountains who sometimes chose to train a worthy human, and sometimes did not.

Torei stood at the gate without entering. He looked up at the plaque for a long time.

"Should we go in?" Shizune asked.

"The brewer said not to go into the mountains," Daien said.

"We're already in the mountains," Senna said, and walked through the gate.

The shrine was simple inside. A stone altar, a small offering box, a bundle of paper streamers gone white and fragile with age. And in the central stone — the flat, square foundation stone on which everything rested — carved with a depth and precision that suggested great age and great intention: the symbol.

The arch. The spiral.

Around it, four smaller marks, arranged at the compass points. Ancient characters that none of them could read.

Torei raised his camera and took a photograph.

He looked at the screen. The image was white. Completely white, as if the flash had overwhelmed everything — but the light in the clearing had been gentle and grey, and he had not used a flash.

He took the photograph again. And again.

Every frame: white.

He looked at Senna. She had her sketchbook out and was drawing the stone as fast as she could, as if she didn't trust the morning to hold still.`,

  {
    n: 14,
    title: `The Road That Walks You`,
    topic: `Japanese pilgrimage road culture — the kaidō, and tabi as spiritual transformation`,
    city: `Journey`,
    publishDate: `August 08, 2026`,
    slabel: `Nakasendo — the mountain road between Edo and Kyoto (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Nakasendo`,
    text: `The train south left Takayama in the early afternoon, winding first through the mountains and then descending into the valley and then the broader plains, and all of it — the narrowing passes, the rivers appearing and vanishing, the way the altitude released itself slowly, like a long exhalation — felt intentional. Like a transition that was taking its time.

Japan's ancient roads have names and histories. The Tokaido, the Nakasendo, the Shikoku pilgrimage circuit — these are not merely routes from one place to another but cultural objects, walked by millions over centuries, their surfaces changed from packed earth to cobblestones to asphalt without the walking being interrupted. The Nakasendo ran through the mountains between Edo and Kyoto, and its post towns — Magome, Tsumago, Narai — are still walkable, still largely intact, still carrying something of the atmosphere of passage.

The concept of *tabi* — journey — carries in Japanese a weight that the English word does not quite hold. A tabi is not only movement between places. It is transformation through movement. The person who arrives is not the same person who departed. The road does something to you, regardless of whether you intended to be changed.

Daien had the Jimbocho book open on his knee. He read the passage about the four-gate mark again. And then he turned to the next chapter — and the next, and the next after that.

He had noticed before that the pages from a certain point felt different. Thicker. He had assumed the paper was simply aged unevenly.

Now he looked more carefully.

The pages after the chapter about the mark were not blank. They had been blank, he was almost certain, when he'd read them on the Shinkansen from Tokyo.

They were not blank now.

Writing had appeared — ink on old paper, precise and small — in a script he could not read. He ran his finger over the characters. The ink was dry but not faded. It looked old. It looked new. It looked, impossibly, like both at once.

He held the book out to Senna without a word.

She looked at the pages. She looked at her hands. She looked out the window at the mountains receding behind them.

"We need someone who can read this," she said.`,

  {
    n: 15,
    title: `The Gate That Never Ends`,
    topic: `Kitsune — fox spirits, Inari, and the 10,000 torii gates of Fushimi`,
    city: `Kyoto`,
    publishDate: `August 15, 2026`,
    slabel: `Kitsune — the fox spirits of Japan (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Kitsune`,
    text: `Shizune had run here before the others woke. She came back at six thirty, slightly out of breath for the first time anyone could remember, and said only: "We need to go now. Before the tourists."

Fushimi Inari Taisha in the dark before dawn is a different place from the photographs. The photographs show the orange gates: thousands of them, dense, ascending the mountain in tunnels of colour, each one donated by a business or family in an act of devotion and gratitude to Inari — the kami of foxes, rice, agriculture, industry, success in the things that matter to people who work hard and hope.

In Shinto tradition, the fox — the kitsune — is Inari's messenger. White foxes guard the shrine entrances, stone figures with red bibs, offerings tucked at their feet. The fox is intelligent, long-lived, capable of assuming human form. It is neither simply good nor simply dangerous. It sees through surfaces.

The four of them walked into the first gate tunnel as the sky lightened above the mountain. The gates were close enough that they moved in and out of orange light with each step, alternating shadow and colour. The sound changed inside — hushed, directional, focused by the wood above and on either side.

Senna looked up. From directly below, looking along the line of gates extending up the slope, the repeated arch of each torii — stacked and overlapping in perspective — created a single shape.

A large arch. And in the negative space at the centre, where the vanishing point pulled everything together: a spiral of receding gates.

She grabbed Daien's arm.

He looked up. He saw it.

A fox crossed the path ten metres ahead. White, or very pale in the early light. It moved without hurry, stopped in the centre of the path, and looked directly at Senna. Not at the group. At Senna specifically.

Then it walked into the mist between the trees.

"Did that just—" Torei began.

"Yes," said Shizune.`,

  {
    n: 16,
    title: `The Beauty of the Wrong Angle`,
    topic: `Wabi-sabi — beauty in imperfection, incompleteness and impermanence`,
    city: `Kyoto`,
    publishDate: `August 22, 2026`,
    slabel: `Wabi-sabi — Japanese aesthetics of imperfection (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Wabi-sabi`,
    text: `The bamboo grove at Arashiyama is louder than people expect.

The stalks move with any wind, even a slight one, and when they move they speak — a dry, clicking, hollow sound that is nothing like music and somehow more beautiful. The sound is incomplete and impermanent and cannot be recorded in any way that keeps it. You have to be there, in the moving air, inside it.

This is, Senna thought, exactly the point.

She had been trying to draw the grove for forty minutes and had failed four times. Every version was wrong. Too orderly, or too chaotic, or too faithful to the actual angle of individual stems, which meant losing the feeling of the whole. She kept trying to get it right.

Wabi-sabi is a Japanese aesthetic philosophy that is most often translated as *the beauty of imperfection* — but this is a little too neat. Wabi suggests the quiet, the irregular, the modest; sabi suggests the worn, the weathered, the passed-through-time. Together they name a sensibility that finds the most profound beauty not in perfection or completion but in the marks left by use and weather and years. The cracked tea bowl. The moss on stone. The way a face looks when it has lived in it for a long time.

Senna stopped trying to get it right. She drew one stalk of bamboo, badly, from an angle that showed almost nothing useful. She drew the shadow it cast, which was crooked. She drew the gap between two stalks where the light came through.

It was the best drawing she had made in months.

Daien had been watching. He picked up his camera and pointed it at the worst angle he could find — looking directly up into the crown of the grove, where the stalks tangled and the light broke into fragments and nothing resolved. He took the picture.

He looked at the screen.

It was the best photograph he had taken in months.

He laughed, quietly, to himself. Then he looked at the base of the bamboo stalk nearest him. On the smooth green skin of the wood, in characters so small and fine they could only be read up close: two words.

Shizune translated them from her year of Japanese study, frowning.

"You're close," she said.`,

  {
    n: 17,
    title: `The Language of Gestures`,
    topic: `Geiko and maiko — Kyoto's living geisha tradition`,
    city: `Kyoto`,
    publishDate: `August 29, 2026`,
    slabel: `Geiko and maiko — Kyoto's geisha tradition (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Geisha`,
    text: `Nobody lingered in Gion the way you lingered in other places. The stone-paved lanes and the low wooden machiya townhouses created the feeling of a place that was still in use, still occupied by its own history, and that did not especially need to be visited by you to continue existing.

Senna liked this about it immediately.

The tradition of the geiko — the word Kyoto uses, where other regions say geisha — is not what most outsiders imagine. It is not performance for tourists, not pantomime, not something that has survived by becoming decorative. A maiko, the apprentice, begins her training in her teens and studies for years: traditional dance, the shamisen, tea ceremony, calligraphy, the art of conversation that puts a guest entirely at ease without appearing to try. The training is demanding and the attrition is high. Those who complete it and become geiko carry a body of living cultural knowledge that has been passed, personally and directly, from woman to woman for centuries.

They glimpsed a maiko through a paper screen — a moving shape, white face and dark hair and the particular precision of a gesture that had been practiced ten thousand times and now arrived without thought.

"She moves like she's drawing," Torei said, and Senna turned to look at him, surprised.

He wasn't wrong.

A geiko in full dress turned the corner ahead of them. She walked without looking at anyone — not from coldness, but from a kind of absolute interior attention. She was somewhere else while being entirely here. As she passed, she dropped something small from the sleeve of her kimono.

Senna picked it up before she knew she was doing it.

It was a card. Heavy paper, cream, blank on one side. On the other, in ink applied with a brush in a single, certain gesture: the symbol.

Below it, an address.

Senna looked up. The geiko had already turned the corner. The lane was empty.`,

    n: 18,
    title: `What Cannot Be Counted`,
    topic: `Zen rock gardens — karesansui and the philosophy of mu`,
    city: `Kyoto`,
    publishDate: `September 05, 2026`,
    slabel: `Ryōan-ji rock garden — the karesansui tradition (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Ry%C5%8Dan-ji`,
    text: `The address was Ryōan-ji.

They arrived the following morning. The temple was calm — not empty, but calm — and the stone garden was reached through a wooden corridor that smelled of old cedar and cold air.

A karesansui garden is composed of raked gravel and stone. No water, no plants, no colour beyond grey and white and the particular pale green of moss that grows on the stones' north sides. Ryōan-ji's garden is the most famous: fifteen stones of varying size, arranged in five groups, set in a sea of raked white gravel. The garden is approximately the size of a tennis court. You view it from a raised wooden walkway, seated.

The famous thing about the fifteen stones is this: no matter where you sit along the walkway, you can see only fourteen.

One stone is always hidden by another. The geometry of the garden ensures it. To see all fifteen simultaneously, you would need to rise above the garden — to leave the position of the viewer entirely.

Daien sat with this for a long time.

Shizune had counted and recounted and confirmed the mathematics.

Senna was thinking about the symbol — how it looked different from every angle. From above a gate tunnel. From below a tree. In a crack repaired with gold. Never exactly the same.

*You cannot see the whole thing from any single place you could stand.*

A monk sat on the walkway further along, very still, very old. After a while he rose and walked toward them with the unhurried certainty of someone who knows exactly how long everything takes.

He stopped in front of Senna.

In clear, quiet English he said: "The fourth one is waiting."

Then he bowed and walked back the way he had come.

Torei started to go after him. Daien caught his arm.

"Don't," said Senna. She was staring at the garden. "He didn't mean here."`,

    n: 19,
    title: `The Fifth Taste`,
    topic: `Umami — the discovery of the fifth flavour and the Japanese philosophy of food`,
    city: `Kyoto`,
    publishDate: `September 12, 2026`,
    slabel: `Umami — the fifth taste, discovered by Kikunae Ikeda (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Umami`,
    text: `Before the tea ceremony, Shizune insisted on the market.

"We haven't eaten properly since Takayama," she said, which was not strictly true but contained a kind of emotional truth that none of them felt like arguing with.

Nishiki Market runs through the covered streets of central Kyoto — narrow, dense, five hundred years old, still in use, full of the things that Kyoto's kitchens have always required. Tofu made that morning. Pickled vegetables in colours that don't exist in other contexts. Fish on ice. Sesame. Miso. The particular smell of dashi.

Dashi — the foundational Japanese stock made from kombu seaweed and dried bonito flakes — is the invisible ingredient in most of Japanese cooking. You don't taste it the way you taste salt. You taste its absence. A broth made with dashi has a depth and roundness and quality of completeness that is difficult to explain without the word that Japanese food science gave to the world: *umami*.

The fifth taste — alongside sweet, sour, bitter and salt — was identified in 1908 by a chemist named Kikunae Ikeda, who was trying to understand why his mother's soup tasted so profoundly satisfying. He isolated the compound responsible: glutamate, present in kombu, in aged cheeses, in tomatoes, in soy sauce. He named the sensation umami: *pleasant savoury taste*. Japan had been cooking with it for centuries before there was a word for it.

Daien ate a small piece of grilled fish on a stick and said: "It's like the food has *ma*. Negative space in the taste."

Senna thought about this. It was either very profound or entirely silly, and she wasn't sure which, and she ate her tofu in silence while she decided.

Back at the ryokan, there was a note under the door.

An envelope, cream-coloured, heavy paper. Inside: an address, a time — tomorrow, eight in the morning — and at the bottom of the card, stamped in red ink, the symbol.`,

  {
    n: 20,
    title: `The Way of Four Things`,
    topic: `Chado — the Way of Tea, Sen no Rikyū, and the four principles`,
    city: `Kyoto`,
    publishDate: `September 19, 2026`,
    slabel: `Chado — the Japanese Way of Tea (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Japanese_tea_ceremony`,
    text: `The room was small, tatami-floored, scented with charcoal and green tea and something underneath those — older, slower, harder to name.

An old woman knelt at the centre, arranging the implements of tea with the patience of someone who had done this ten thousand times and understood that repetition is not diminishment. Each motion was complete. Nothing was adjusted after it was placed.

The Way of Tea — chado — is attributed in its classical form to Sen no Rikyū, the sixteenth-century tea master who served both Oda Nobunaga and Toyotomi Hideyoshi, and who brought the tea ceremony to its highest and most radical refinement. He stripped away everything decorative. He made the room smaller, the door lower, so that everyone who entered had to bow. He said the four principles were wa (harmony), kei (respect), sei (purity), jaku (tranquility) — and that none of these were ideas. They were practices. You learned them by doing them, by being in the room, by paying attention.

The four of them knelt. Senna noticed that Torei managed this without complaint, which she marked as growth.

The tea was brought. They drank in silence. The silence was not uncomfortable.

Afterward, the old woman looked at each of them in turn. Then she spoke. Her Japanese was formal and slow, and she paused often to allow for translation — though there was no translator present, and somehow the pauses were enough.

She knew the mark, she said. It was called the shimon — the four-gate mark. It had been used by a group of pilgrims in the Edo period who believed that a particular path through four sacred cities held something that had been deliberately hidden after a great conflict. The mark was their signature. And it reappeared, she said, when it needed to be found.

She looked at Senna.

"The path chose four," she said. "As it always chooses four."

She looked at Daien. At Torei. At Shizune.

"You must finish it in Osaka. You have until the last day of October."

A silence.

"What does it open?" Senna asked.

The old woman smiled, very slightly, and began collecting the tea bowls.`,

  {
    n: 21,
    title: `The City That Eats`,
    topic: `Kuidaore — Osaka's identity as Japan's kitchen`,
    city: `Osaka`,
    publishDate: `September 26, 2026`,
    slabel: `Kuidaore — Osaka's culinary identity (Wikipedia)`,
    surl: `https://en.wikipedia.org/wiki/Kuid%C5%8Dare`,
    text: `Osaka arrived like an entirely different country.

Not chaotic — Japan is never chaotic — but louder, brighter, more frankly interested in pleasure. If Kyoto was a sentence that took care over every word, Osaka was the conversation after the sake has been poured. Things here were funnier and more urgent and smelled better, and the streets of Dotonbori at dusk were lit in every colour that exists and a few that had apparently been invented for the occasion.

The expression *kuidaore* — roughly, eat until you fall down — is Osaka's civic motto. It refers to the willingness to spend extravagantly on food while economising on everything else; to the belief that what you put in your body and share with others is worth more than what you display. Osaka has been a trading city and a food city for a thousand years, and the citizens are direct about their priorities.

Shizune led them to a takoyaki stand immediately. Torei ate six of the octopus dumplings in a row and said something inarticulate that Senna interpreted as joy. Daien photographed the batter pouring into the moulds. Everyone's face was warm from the grill.

For a while, the weight of the tea ceremony — the deadline, the four-gate mark, the feeling of a path narrowing toward something unknown — released itself. They were four people eating street food in a lit-up city, and the city was generous with its light.

Senna laughed. She hadn't expected to. It came up from somewhere unplanned.

Later, when they were back at the hotel and Torei was asleep and Shizune was somewhere running in the dark streets below, Daien picked up the Jimbocho book from the nightstand where it had been sitting, closed, since Takayama.

He opened it to the pages that had appeared blank and then filled with writing.

There was a new page.

It had not been there before. He was certain of this. He had looked at every page.

A hand-drawn map. Osaka. Streets marked with careful lines. And at the edge of the page, a small red mark: the symbol.

He traced the route with his finger.`,

    text: `The map led to the castle grounds, which was not entirely a surprise.

    text: `They found the bar by instinct, which is the only reliable way to find anything in Namba's basement streets — a grid of lanes that went deeper and further than seemed structurally possible, each one holding something small and serious and entirely its own.

The bar was seven seats. The bartender was a man of perhaps sixty with the calm, attentive face of someone who has spent decades deciding that other people's comfort matters more than his own visibility. He worked behind the bar with the efficiency of someone who never performs efficiency — the motions were simply the shortest distance between the drink and the person who needed it.

Omotenashi is the Japanese concept of selfless, anticipatory hospitality. It is distinguished from ordinary good service by the absence of expectation: the host does not perform care in hopes of reward. The care is complete in itself. What makes it extraordinary is the attention — the noticing that precedes the action. The guest does not ask. The host observes, deduces, and provides.

Without being asked, the bartender brought Shizune a coffee first. He poured Daien's drink with a slightly wider glass than the others — Daien had been holding every cup all evening with two hands, and the bartender had noticed, and adjusted. He set Torei's drink slightly closer to his elbow, because Torei was left-handed, and the stools were arranged slightly awkwardly for someone that tall.

Nobody commented on any of this. It would have broken something to comment on it.

They talked for a long time. About what they'd seen. About who they'd been at the beginning and who they were now. Torei said: "I came here to see Fuji. I didn't expect to see all of this." Shizune admitted, quietly, that she hadn't slept well in a week. "Not from being tired," she said. "From not wanting to stop."

When the bartender brought the bill, he set it face down with a small folded paper on top.

Senna opened it.

It said: *The shrine opens at sunrise. Go alone.*

    text: `They went together. Of course they went together.

The shrine was in a backstreet that smelled of temple incense and morning bread and the particular cold of Osaka at half past five in October. It was very small — smaller than they had imagined — and very old, tucked between two buildings in a way that suggested it had been there before the buildings and the buildings had been built around it out of a kind of instinctive respect.

There was no gate. No sign. Four stone lanterns, unlit. And at the centre of the courtyard: four stones, each one hip-height, each one carved with one quarter of the symbol they had been following across four cities and three months.

Senna opened her sketchbook to a blank page. She placed the book at the centre, between the stones, and traced each quarter mark — one from each stone, turning the book carefully. When she closed the circle, the four quarters joined.

The complete symbol was not the arch and the spiral she had been drawing. Or rather: it was all of them. Seen from above, the combined shape was a map. Seen from the side, an arch. From below, a spiral. From directly ahead, something that looked, simply, like a path.

The ancient pilgrims had not hidden treasure. They had not sealed a secret that could be unlocked. They had left a practice — a way of moving through the world with the quality of attention that notices what has been there all along. The path was not the destination. The path was how you learned to see.

*Mono no aware* — the phrase belongs to the eighteenth-century scholar Motoori Norinaga, who used it to name the emotional register of Japanese literature that most moves people. Literally: the pathos of things. The feeling that arises when beauty is perceived alongside its impermanence — the cherry blossom falling, the candle going out, the last day of a journey. The feeling is not grief. It is something more tender than grief: a love for the thing precisely because it is passing.

Senna closed her sketchbook.

She had drawn the symbol one final time, and now she knew what it was, and she would not need to draw it again — not because it was finished, but because she had learned to see it without the pencil.

Daien took no photographs. He stood with his hands in his pockets and looked at the four stones and the pale sky opening above the roofline.

Torei looked up at the same sky. Somewhere behind the clouds, at the correct angle and distance, a mountain waited — patient as it had always been, fully itself, neither asking to be seen nor refusing it.

Shizune finished her coffee. She handed the empty cup to Senna. She looked at the exit of the courtyard, where the street was beginning to fill with early light and the smell of the day starting.

She looked back at the three of them.

"Ready?" she said.

She was already walking.`,

const START = new Date('2026-05-09T00:00:00');
const END   = new Date('2026-10-24T00:00:00');

function availableCount() {
  const today = new Date(); today.setHours(0,0,0,0);
  const s = new Date(START); s.setHours(0,0,0,0);
  if (today < s) return 0;
  return Math.min(Math.floor((today - s) / 86400000 / 7) + 1, 24);
}

function countdown() {
  const today = new Date(); today.setHours(0,0,0,0);
  const end   = new Date(END);   end.setHours(0,0,0,0);
  return Math.max(0, Math.round((end - today) / 86400000));
}

let viewing = null;

function toHTML(text) {
  return text.split(/\n\n+/).map(p => {
    const line = p.trim().replace(/\*(.*?)\*/g, '<em>$1</em>');
    return `<p>${line}</p>`;
  }).join('');
}

function show(ch) {
  document.getElementById('grid').innerHTML = `
    <div class="illus">${ch.svg}</div>
    <div class="chap">
      <div class="chap-head">
        <div class="chap-n">Chapter ${ch.n} of 24</div>
        <div class="chap-title">${ch.title}</div>
        <div class="chap-topic">${ch.topic}</div>
      </div>
      <div class="chap-text">${toHTML(ch.text)}</div>
    </div>`;
  document.getElementById('sbadge').textContent  = ch.city;
  document.getElementById('sloc').textContent    = ch.topic.split('—')[0].trim();
  document.getElementById('sdate').textContent   = 'Published ' + ch.publishDate;
  document.getElementById('srclink').href        = ch.surl;
  document.getElementById('srclink').textContent = ch.slabel;
  document.getElementById('srcbar').style.display = '';
  document.querySelectorAll('.nbtn').forEach(b => {
    b.classList.toggle('active', +b.dataset.n === ch.n);
    b.classList.toggle('latest', false);
  });
  viewing = ch.n;
}

function buildNav(avail) {
  const nav = document.getElementById('navbar');
  let h = '<span class="nav-lbl">Chapters:</span>';
  for (let i = 1; i <= avail; i++) {
    const cls = i === avail ? 'nbtn latest' : 'nbtn';
    h += `<button class="${cls}" data-n="${i}" onclick="show(CHAPTERS[${i-1}])" title="Ch ${i}: ${CHAPTERS[i-1].title}">${i}</button>`;
  }
  if (avail < 24) {
    h += `<span class="nxt">· Ch ${avail+1} arrives ${CHAPTERS[avail].publishDate}</span>`;
  }
  nav.innerHTML = h;
}

function showSoon(avail) {
  const days = Math.ceil((START - new Date()) / 86400000);
  document.getElementById('grid').innerHTML = `
    <div class="soon" style="width:100%">
      <div style="font-size:2.8rem">⛩️</div>
      <h2>The journey begins Saturday, May 9</h2>
      <p>Chapter 1 arrives in ${days} day${days===1?'':'s'}.</p>
      <p style="font-size:.85rem;margin-top:6px;font-family:system-ui;">
        Senna, Daien, Torei and Shizune travel through Japan — one chapter per week, every Saturday.
      </p>
    </div>`;
  document.getElementById('sbadge').textContent = 'Coming Soon';
  document.getElementById('sloc').textContent   = '24 chapters · 24 weeks';
  document.getElementById('sdate').textContent  = 'Starting 9 May 2026';
  document.getElementById('srcbar').style.display = 'none';
  document.getElementById('navbar').innerHTML =
    '<span class="nav-lbl">Chapters unlock weekly from 9 May 2026 →</span>';
}

function init() {
  document.getElementById('cdval').textContent = countdown() + ' days';
  const avail = availableCount();
  if (avail === 0) { showSoon(); return; }
  buildNav(avail);
  show(CHAPTERS[avail - 1]);
}

init();
